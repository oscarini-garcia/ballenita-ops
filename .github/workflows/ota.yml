name: Publish OTA bundle

# Publica una actualización OTA (JS/web) para la app iOS SIN pasar por Apple.
# La app lee el manifiesto en releases/latest/download/latest.json y, si la versión
# es más nueva que el bundle instalado, descarga bundle.zip y lo aplica.
#
# Automático: en cada push a main, si la versión de app/package.json aún NO tiene
# release `ota-v<version>`, se publica. Es decir: para lanzar un OTA basta con SUBIR
# la versión en package.json y mergear. Si no cambias la versión, no se publica nada.
# También se puede lanzar a mano (workflow_dispatch). Ver docs/IOS.md.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['app/**']

permissions:
  contents: write # crear el release

jobs:
  bundle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      # ¿La versión de package.json ya tiene release? Si sí, no publicamos (evita
      # duplicar en cada merge). Sube la versión para disparar un OTA nuevo.
      - name: ¿Versión nueva?
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if gh release view "ota-v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ ota-v$VERSION ya existe → no publico. Sube la versión en package.json para un OTA nuevo."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "✅ ota-v$VERSION es nueva → publico OTA."
          fi

      - if: steps.check.outputs.publish == 'true'
        run: npm ci
      - if: steps.check.outputs.publish == 'true'
        run: npm test

      # Build para la app: base '/' (NO el subpath de Pages).
      - if: steps.check.outputs.publish == 'true'
        run: npm run build:app
        env:
          VITE_JSONBIN_ID: ${{ secrets.VITE_JSONBIN_ID }}
          VITE_JSONBIN_KEY: ${{ secrets.VITE_JSONBIN_KEY }}
          VITE_ONESIGNAL_APP_ID: ${{ secrets.VITE_ONESIGNAL_APP_ID }}
          VITE_PUSH_ENDPOINT: ${{ secrets.VITE_PUSH_ENDPOINT }}

      - name: Empaquetar bundle + manifiesto
        if: steps.check.outputs.publish == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          # El zip debe llevar index.html en la raíz (contenido de dist/, no la carpeta).
          (cd dist && zip -qr ../bundle.zip .)
          CHECKSUM=$(sha256sum bundle.zip | awk '{print $1}')
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/ota-v${VERSION}/bundle.zip"
          cat > latest.json <<EOF
          { "version": "${VERSION}", "url": "${URL}", "checksum": "${CHECKSUM}" }
          EOF
          echo "Manifiesto:"; cat latest.json

      - name: Crear release OTA
        if: steps.check.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ota-v${{ steps.check.outputs.version }}
          name: OTA v${{ steps.check.outputs.version }}
          body: Actualización OTA (JS/web) para la app iOS. No requiere review de Apple.
          files: |
            app/bundle.zip
            app/latest.json
